<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPlanner</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"> <!--uso o parametro family para dizer quais fontes eu quero carregar do googleapis-->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">
            <span class="nav-logo-text">UniPlanner</span>
        </div>
        <div class="nav-date" id="navDate">
            <!-- Vou usar o js para preencher essa div depois -->
        </div>
    </nav>

    <main class="app">

        <header class="app-header">
            <h1 class="app-title">Minhas Tarefas</h1>
            <p class="app-subtitle">Gerencie suas atividades acadêmicas</p>
        </header>

        <section id="subjectsSection">
            <h2 class="section-label">Disciplinas</h2>
            <div class="subjects-grid" id="subjectsGrid">
                <!-- novamente o js vai ser utilizado para preencher ela  -->
            </div>
        </section>

        <section id="completedSection">
            <h2 class="section-label">Tarefas Concluídas</h2>
            <div class="completed-grid" id="completedGrid">
                <!-- Vou usar o js -->
            </div>
        </section>

    </main>

    <div class="overlay" id="overlay"></div>

    <div class="modal" id="modalSubject">
        <h2 class="modal-title">Nova Disciplina</h2>

        <div class="form-group">
            <label class="form-label">Nome</label>
            <input type="text" class="form-input" id="subjectName" placeholder="Ex: Programção Web">
        </div>

        <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="saveSubject()">Criar</button>
        </div>
    </div>

    <script src="js/model.js"></script>
    <script src="js/scripts.js"></script>
</body>
    
</html>
